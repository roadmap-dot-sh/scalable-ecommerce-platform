server:
  port: 8084

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

services:
  cart:
    url: ${CART_SERVICE_URL:http://localhost:8083}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8085}

logging:
  level:
    com.example.orderservice: INFO
