server:
  port: 8083

spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:h2:mem:cartdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8082}
  user:
    url: ${USER_SERVICE_URL:http://localhost:8081}

logging:
  level:
    com.example.cartservice: INFO
